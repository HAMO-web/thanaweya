<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#06080f">
<title>لمة الثانوية — المحادثات</title>
<link rel="icon" type="image/png" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080f;--bg2:#0a0e1a;--bg3:#0f1525;--card:#111827;--card2:#1a2240;--card3:#1e2a4a;
  --blue:#3b82f6;--blue2:#60a5fa;--teal:#14b8a6;--teal2:#2dd4bf;
  --purple:#8b5cf6;--purple2:#a78bfa;--gold:#f59e0b;--gold2:#fbbf24;
  --green:#22c55e;--red:#ef4444;--rose:#f43f5e;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--text4:#475569;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --r:12px;--r2:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(59,130,246,0.05),transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(20,184,166,0.05),transparent 50%);pointer-events:none;z-index:0}

/* ── LIST VIEW ── */
#chat-list-view{display:flex;flex-direction:column;height:100%;position:relative;z-index:1}
.list-topbar{background:rgba(6,8,15,0.95);backdrop-filter:blur(16px);border-bottom:0.5px solid var(--border);padding:10px 14px;flex-shrink:0}
.list-topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.list-title{font-family:'Cairo',sans-serif;font-size:17px;font-weight:700}
.list-actions{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;position:relative}
.icon-btn:hover{background:var(--card2)}
.icon-btn svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:8px 12px}
.search-box svg{width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:1.5;flex-shrink:0}
.search-input{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:var(--text);font-family:'Tajawal',sans-serif}
.search-input::placeholder{color:var(--text4)}
.chat-items{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.pinned-label{font-size:10px;color:var(--text4);padding:4px 14px;letter-spacing:1px}
.chat-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background 0.15s}
.chat-item:hover{background:rgba(255,255,255,0.03)}
.chat-item.pinned{background:rgba(59,130,246,0.04);border-right:2px solid var(--blue)}
.ci-avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;overflow:hidden}
.ci-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ci-info{flex:1;min-width:0}
.ci-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.ci-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px}
.ci-time{font-size:10px;color:var(--text4)}
.ci-last-row{display:flex;align-items:center;justify-content:space-between}
.ci-last{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.ci-badge{min-width:18px;height:18px;border-radius:9px;background:var(--blue);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.pin-icon{font-size:10px;color:var(--text4)}
.verified{font-size:12px;color:var(--blue2)}
.dev-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(245,158,11,0.15);color:var(--gold2);border:0.5px solid rgba(245,158,11,0.2)}

/* ── ROOM VIEW ── */
#chat-room-view{display:none;flex-direction:column;height:100%;position:relative;z-index:1}
.room-header{background:rgba(6,8,15,0.95);backdrop-filter:blur(16px);border-bottom:0.5px solid var(--border);padding:10px 14px;flex-shrink:0}
.rh-row1{display:flex;align-items:center;gap:10px}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back-btn svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.rh-avatar{width:36px;height:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.rh-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.rh-info{flex:1}
.rh-name{font-size:14px;font-weight:700}
.rh-sub{font-size:10px;color:var(--text3);margin-top:1px;display:flex;align-items:center;gap:8px}
.rh-actions{display:flex;gap:6px}
.stat-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:statpulse 2s infinite}
@keyframes statpulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* pinned msg */
.pinned-msg{background:rgba(59,130,246,0.06);border-bottom:0.5px solid rgba(59,130,246,0.12);padding:7px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.pm-txt{font-size:11px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* messages */
.messages-area{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.date-divider{text-align:center;font-size:10px;color:var(--text4);padding:4px 0;display:flex;align-items:center;gap:8px}
.date-divider::before,.date-divider::after{content:'';flex:1;height:0.5px;background:var(--border)}
.msg-wrap{display:flex;gap:8px;align-items:flex-end;max-width:85%}
.msg-wrap.mine{flex-direction:row-reverse;align-self:flex-end}
.msg-wrap.other{align-self:flex-start}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;cursor:pointer;overflow:hidden}
.msg-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.msg-av.dev-av{border:2px solid var(--gold)}
.msg-body{display:flex;flex-direction:column}
.msg-meta{font-size:9px;color:var(--text4);margin-bottom:3px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.grade-tag{font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(59,130,246,0.1);color:var(--blue2)}
.grade-tag.azhar{background:rgba(20,184,166,0.1);color:var(--teal2)}
.grade-tag.adabi{background:rgba(245,158,11,0.1);color:var(--gold2)}
.dev-name{color:var(--gold2);font-weight:600}
.bubble{padding:8px 11px;position:relative;cursor:pointer}
.bubble.other{background:var(--card2);border-radius:12px 12px 12px 2px;border:0.5px solid var(--border)}
.bubble.mine{background:linear-gradient(135deg,#1d4ed8,#1e3a8a);border-radius:12px 12px 2px 12px}
.bubble.dev{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(251,191,36,0.08));border:0.5px solid rgba(245,158,11,0.2);border-radius:12px 12px 12px 2px}
.bubble-txt{font-size:13px;color:var(--text);line-height:1.5;word-break:break-word}
.bubble-txt.big-emoji{font-size:36px;line-height:1.2}
.bubble-footer{display:flex;align-items:center;justify-content:flex-end;margin-top:3px;gap:5px}
.bubble-time{font-size:9px;color:rgba(255,255,255,0.3)}
.bubble-ticks{font-size:10px;color:rgba(255,255,255,0.4)}
.bubble-ticks.read{color:var(--blue2)}

/* reply inside bubble */
.reply-preview{background:rgba(255,255,255,0.07);border-right:2px solid var(--blue2);padding:5px 8px;border-radius:5px;margin-bottom:6px;cursor:pointer}
.rp-name{font-size:9px;color:var(--blue2);margin-bottom:2px;font-weight:600}
.rp-txt{font-size:10px;color:var(--text3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:160px}

/* reactions */
.reactions-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.reaction-pill{background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:2px 7px;font-size:11px;display:flex;align-items:center;gap:3px;cursor:pointer;transition:all 0.15s;user-select:none}
.reaction-pill:hover{background:rgba(255,255,255,0.12);transform:scale(1.05)}
.reaction-pill.mine{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.35)}
.reaction-count{font-size:9px;color:var(--text3)}

/* reaction bar on hover */
.reaction-bar{
  position:absolute;top:-40px;right:0;
  background:var(--card2);border:0.5px solid var(--border2);
  border-radius:24px;padding:6px 10px;
  display:flex;gap:6px;
  opacity:0;transform:scale(0.8) translateY(4px);
  transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;z-index:10;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
.bubble:hover .reaction-bar{opacity:1;transform:scale(1) translateY(0);pointer-events:all}
.r-emoji{font-size:18px;cursor:pointer;transition:transform 0.15s;line-height:1;padding:2px}
.r-emoji:hover{transform:scale(1.35) translateY(-2px)}

/* mention in text */
.mention-highlight{color:var(--blue2);font-weight:600;background:rgba(59,130,246,0.1);border-radius:4px;padding:0 3px}
.mention-highlight.me{color:var(--gold2);background:rgba(245,158,11,0.12)}

/* typing */
.typing-indicator{display:flex;gap:8px;align-items:flex-end;padding:2px 0}
.typing-av{width:28px;height:28px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.typing-bubble{background:var(--card2);border-radius:12px 12px 12px 2px;padding:10px 14px;display:flex;gap:4px;align-items:center;border:0.5px solid var(--border)}
.td{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.td:nth-child(1){animation:tb 1s ease 0s infinite}
.td:nth-child(2){animation:tb 1s ease 0.15s infinite}
.td:nth-child(3){animation:tb 1s ease 0.3s infinite}
@keyframes tb{0%,100%{transform:translateY(0);background:var(--text4)}50%{transform:translateY(-5px);background:var(--blue)}}

/* reply bar */
.reply-bar{background:rgba(59,130,246,0.06);border-top:0.5px solid rgba(59,130,246,0.15);padding:8px 14px;display:none;flex-shrink:0;align-items:center;gap:8px}
.reply-bar.show{display:flex}
.rb-line{width:3px;height:36px;background:var(--blue);border-radius:3px;flex-shrink:0}
.rb-content{flex:1;min-width:0}
.rb-name{font-size:10px;color:var(--blue2);margin-bottom:2px;font-weight:600}
.rb-txt{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-close{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex-shrink:0;color:var(--text3)}

/* input */
.input-area{background:rgba(10,14,26,0.97);backdrop-filter:blur(12px);border-top:0.5px solid var(--border);padding:10px 12px;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.input-row{display:flex;align-items:flex-end;gap:8px}
.input-icons{display:flex;gap:6px;align-items:center;padding-bottom:6px}
.input-icon{font-size:21px;cursor:pointer;transition:transform 0.15s;line-height:1;user-select:none}
.input-icon:hover{transform:scale(1.15)}
.input-box{flex:1;background:var(--card);border:0.5px solid var(--border);border-radius:22px;padding:10px 14px;font-size:13px;color:var(--text);font-family:'Tajawal',sans-serif;outline:none;resize:none;max-height:100px;min-height:42px;line-height:1.4;transition:border-color 0.2s;scrollbar-width:none}
.input-box:focus{border-color:rgba(59,130,246,0.4)}
.input-box::placeholder{color:var(--text4)}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s;border:none;box-shadow:0 2px 10px rgba(59,130,246,0.3)}
.send-btn:hover{transform:scale(1.06)}
.send-btn svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* mention list */
.mention-list{position:absolute;bottom:70px;right:12px;left:12px;background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--r);overflow:hidden;display:none;z-index:20;max-height:180px;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,0.4)}
.mention-list.show{display:block}
.mention-item{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;transition:background 0.15s}
.mention-item:hover{background:rgba(255,255,255,0.05)}
.mi-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.mi-name{font-size:12px;color:var(--text);font-weight:500}
.mi-grade{font-size:10px;color:var(--text3)}

/* emoji picker */
.emoji-picker{position:absolute;bottom:70px;right:12px;background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--r2);padding:12px;display:none;z-index:20;width:284px;box-shadow:0 -4px 20px rgba(0,0,0,0.4)}
.emoji-picker.show{display:block}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.ep-emoji{font-size:22px;cursor:pointer;text-align:center;padding:5px;border-radius:6px;transition:all 0.15s;line-height:1;user-select:none}
.ep-emoji:hover{background:rgba(255,255,255,0.08);transform:scale(1.2)}

/* room menu */
.room-menu{position:absolute;top:56px;left:14px;background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--r2);padding:6px;z-index:50;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.5);display:none}
.room-menu.show{display:block;animation:menuIn 0.15s ease}
@keyframes menuIn{from{opacity:0;transform:scale(0.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.rm-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:background 0.15s;font-size:13px}
.rm-item:hover{background:rgba(255,255,255,0.06)}
.rm-item.danger{color:var(--red)}
.rm-item svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* profile popup */
.profile-popup{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.profile-popup.show{display:flex}
.pp-card{background:var(--bg3);border-radius:24px 24px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);position:relative}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pp-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px}
.pp-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pp-avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.pp-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.pp-avatar.dev-frame{border:2px solid var(--gold);box-shadow:0 0 12px rgba(245,158,11,0.3)}
.pp-name{font-size:17px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:3px}
.pp-grade{font-size:11px;color:var(--text3);margin-bottom:4px}
.pp-num{font-size:12px;color:var(--blue2);font-family:monospace;letter-spacing:0.5px}
.pp-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.pp-btn{padding:10px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--card);font-size:12px;color:var(--text2);cursor:pointer;text-align:center;font-family:'Tajawal',sans-serif;transition:all 0.2s}
.pp-btn:hover{background:var(--card2)}
.pp-btn.primary{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.25);color:var(--blue2)}

/* toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px 18px;font-size:12px;color:var(--text);z-index:9000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* bottom nav */
.bottom-nav{background:rgba(10,14,26,0.95);backdrop-filter:blur(16px);border-top:0.5px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all 0.2s;text-decoration:none}
.nav-item svg{width:22px;height:22px;stroke:var(--text4);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s}
.nav-item.active svg{stroke:var(--blue2)}
.nav-label{font-size:9px;color:var(--text4);transition:color 0.2s}
.nav-item.active .nav-label{color:var(--blue2)}

/* search overlay */
.search-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;backdrop-filter:blur(8px);padding:60px 16px 20px;flex-direction:column;gap:8px}
.search-overlay.show{display:flex}
.search-overlay-input{background:var(--card2);border:0.5px solid var(--border2);border-radius:14px;padding:12px 16px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;width:100%}
.search-result{background:var(--card);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;border:0.5px solid var(--border)}
.search-result:hover{background:var(--card2)}
</style>
</head>
<body>

<div id="toast"></div>

<!-- Profile popup -->
<div class="profile-popup" id="profile-popup" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="pp-card">
    <div class="pp-handle"></div>
    <div class="pp-header">
      <div class="pp-avatar" id="pp-avatar">م</div>
      <div>
        <div class="pp-name" id="pp-name">—</div>
        <div class="pp-grade" id="pp-grade">—</div>
        <div class="pp-num" id="pp-num">—</div>
      </div>
    </div>
    <div class="pp-actions">
      <div class="pp-btn" onclick="copyNum()">📋 نسخ الرقم</div>
      <div class="pp-btn primary" id="pp-msg-btn" onclick="copyNum()" style="display:none">💬 مراسلة</div>
    </div>
  </div>
</div>

<!-- Search overlay -->
<div class="search-overlay" id="search-overlay" onclick="if(event.target===this)closeSearch()">
  <input class="search-overlay-input" id="search-overlay-input" placeholder="ابحث في الرسايل..." oninput="searchMessages(this.value)" autofocus>
  <div id="search-results"></div>
</div>

<!-- ══ CHAT LIST VIEW ══ -->
<div id="chat-list-view">
  <div class="list-topbar">
    <div class="list-topbar-row1">
      <div class="list-title">المحادثات 💬</div>
      <div class="list-actions">
        <div class="icon-btn" onclick="location.href='index.html'">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        </div>
      </div>
    </div>
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

/* ════════════════════════════════
   HELPERS
════════════════════════════════ */
function showToast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function isOnlyEmoji(txt){
  // شامل كل الإيموجي الحديثة
  const stripped=txt.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}\uFE0F\u200D]+/gu,'').trim();
  return stripped===''&&txt.trim().length>0&&[...txt.trim()].length<=3;
}

function gradeTagClass(grade){
  if(!grade)return'';
  if(grade.includes('أزهر')||grade.includes('z'))return'azhar';
  if(grade.includes('أدبي'))return'adabi';
  return'';
}

function formatMentions(text){
  if(!text)return'';
  // هايلايت المنشنات
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/@(الكل|الجميع)/g,'<span class="mention-highlight me">@$1</span>')
    .replace(/@(\S+)/g,(m,name)=>{
      const isMe=currentUserData&&(name===currentUserData.fullName||name===(currentUserData.nickname||''));
      return`<span class="mention-highlight${isMe?' me':''}">${m}</span>`;
    });
}

function userColor(uid){
  // لون ثابت من الـ UID
  const colors=['#1d4ed8','#0f766e','#7c3aed','#b45309','#0891b2','#15803d','#be123c','#6d28d9','#c2410c','#0369a1'];
  let hash=0;
  for(let i=0;i<uid.length;i++)hash=(hash<<5)-hash+uid.charCodeAt(i);
  return colors[Math.abs(hash)%colors.length];
}

function timeStr(ts){
  if(!ts)return'';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
}

function relativeTime(ts){
  if(!ts)return'';
  const d=ts.toDate?ts.toDate():new Date(ts);
  const diff=(Date.now()-d.getTime())/1000;
  if(diff<60)return'الآن';
  if(diff<3600)return Math.floor(diff/60)+' د';
  if(diff<86400)return Math.floor(diff/3600)+' س';
  return d.toLocaleDateString('ar-EG',{day:'numeric',month:'short'});
}

/* ════════════════════════════════
   RENDER MESSAGE
════════════════════════════════ */
function renderMsg(msg,isMe){
  const onlyEmoji=isOnlyEmoji(msg.text||'');
  const isAdmin=msg.isAdmin||(msg.email===ADMIN_EMAIL)||(msg.platformNum===ADMIN_NUM);
  const color=msg.color||userColor(msg.uid||'x');
  const displayName=msg.nickname||msg.fullName||msg.name||'مستخدم';
  const avatarContent=msg.photoURL
    ?`<img src="${msg.photoURL}" alt="">`
    :displayName.charAt(0).toUpperCase();
  const devFrame=isAdmin?'dev-av':'';

  // grade label — مثال: "تالتة ثانوي أزهر علمي"
  const gradeLabel=msg.gradeLabel&&msg.branch
    ?`${msg.gradeLabel} ${msg.branch}`
    :(msg.grade||'');
  const gradeTagHtml=gradeLabel&&!isAdmin
    ?`<span class="grade-tag ${gradeTagClass(gradeLabel)}">${gradeLabel}</span>`:'';

  // reply
  const replyHTML=msg.replyTo
    ?`<div class="reply-preview" onclick="scrollToMsg('${msg.replyTo.id||''}')">
        <div class="rp-name">${msg.replyTo.name||''}</div>
        <div class="rp-txt">${msg.replyTo.text||''}</div>
      </div>`:'';

  // reactions
  const reactHTML=msg.reactions&&Object.keys(msg.reactions).length
    ?`<div class="reactions-row">${
        Object.entries(msg.reactions).map(([e,data])=>{
          const count=typeof data==='number'?data:(data.count||0);
          const mine=data.users&&data.users.includes(currentUser?.uid);
          return`<div class="reaction-pill${mine?' mine':''}" onclick="toggleReaction('${msg.id}','${e}')">${e}<span class="reaction-count">${count}</span></div>`;
        }).join('')
      }</div>`:'';

  // reaction bar (6 emojis)
  const reactionBarHtml=`<div class="reaction-bar">${
    ['❤️','😂','🔥','👏','😢','🎯'].map(e=>
      `<span class="r-emoji" onclick="event.stopPropagation();toggleReaction('${msg.id}','${e}')">${e}</span>`
    ).join('')
  }</div>`;

  if(isMe){
    return`<div class="msg-wrap mine" id="msg-${msg.id}">
      <div class="msg-av ${devFrame}" style="background:${color}" onclick="showProfile('${msg.uid||''}')">
        ${avatarContent}
      </div>
      <div class="msg-body">
        <div class="bubble mine ${onlyEmoji?'':''}">
          ${reactionBarHtml}
          ${replyHTML}
          <div class="bubble-txt${onlyEmoji?' big-emoji':''}">${formatMentions(msg.text)}</div>
          <div class="bubble-footer">
            <span class="bubble-time">${msg.timeStr||timeStr(msg.time)||''}</span>
            <span class="bubble-ticks${msg.readBy&&msg.readBy.length>1?' read':''}">✓✓</span>
          </div>
        </div>
        ${reactHTML}
      </div>
    </div>`;
  }

  const nameHTML=isAdmin
    ?`<span class="dev-name">HAMO</span> <span class="verified">✓</span> <span class="dev-badge">مطور الموقع</span>`
    :displayName;

  return`<div class="msg-wrap other" id="msg-${msg.id}" ondblclick="setReply('${msg.id}','${displayName.replace(/'/g,"\\'")}','${(msg.text||'').replace(/'/g,"\\'").replace(/\n/g,' ')}')">
    <div class="msg-av ${devFrame}" style="background:${color};${isAdmin?'border:2px solid var(--gold);':''}" onclick="showProfile('${msg.uid||''}')">
      ${avatarContent}
    </div>
    <div class="msg-body">
      <div class="msg-meta">
        ${nameHTML} ${gradeTagHtml}
      </div>
      <div class="bubble ${isAdmin?'dev':'other'}">
        ${reactionBarHtml}
        ${replyHTML}
        <div class="bubble-txt${onlyEmoji?' big-emoji':''}">${formatMentions(msg.text)}</div>
        <div class="bubble-footer">
          <span class="bubble-time">${msg.timeStr||timeStr(msg.time)||''}</span>
        </div>
      </div>
      ${reactHTML}
    </div>
  </div>`;
}

/* ════════════════════════════════

function openGroupChat(){

function backToList(){

  renderedMsgIds.clear();

/* ════════════════════════════════
   LOAD MESSAGES — onSnapshot صح
════════════════════════════════ */
function loadGroupMessages(){
  if(unsubMessages)unsubMessages();
  renderedMsgIds.clear();
  const area=document.getElementById('messages-area');
  area.innerHTML=`<div class="date-divider">اليوم</div>`;

  unsubMessages=db.collection('chats').doc('group').collection('messages')
    .orderBy('time','asc').limitToLast(80)
    .onSnapshot(snap=>{
      const wasAtBottom=(area.scrollHeight-area.scrollTop-area.clientHeight)<80;

      snap.docChanges().forEach(change=>{
        if(change.type==='added'){
          const doc=change.doc;
          if(renderedMsgIds.has(doc.id))return; // ← مش بيكرر
          renderedMsgIds.add(doc.id);

          const data=doc.data();
          const isMe=data.uid===currentUser.uid;
          const msgObj={
            id:doc.id,
            ...data,
            timeStr:timeStr(data.time),
          };
          const wrapper=document.createElement('div');
          wrapper.innerHTML=renderMsg(msgObj,isMe);
          const el=wrapper.firstElementChild;
          if(el){
            el.style.animation='msgIn 0.2s ease both';
            area.appendChild(el);
          }

          // update group-last في القائمة
          const lastEl=document.getElementById('group-last');
          if(lastEl)lastEl.textContent=(data.nickname||data.fullName||data.name||'مستخدم')+': '+(data.text||'').slice(0,30);
          const timeEl=document.getElementById('group-time');
          if(timeEl)timeEl.textContent=relativeTime(data.time);
        }

        if(change.type==='modified'){
          // تحديث الريأكشنز من غير reload
          const el=document.getElementById('msg-'+change.doc.id);
          if(el){
            const data=change.doc.data();
            const isMe=data.uid===currentUser.uid;
            const msgObj={id:change.doc.id,...data,timeStr:timeStr(data.time)};
            const wrapper=document.createElement('div');
            wrapper.innerHTML=renderMsg(msgObj,isMe);
            const newEl=wrapper.firstElementChild;
            if(newEl)el.replaceWith(newEl);
          }
        }
      });

      if(wasAtBottom)area.scrollTop=area.scrollHeight;
    },err=>{
      console.error('onSnapshot error',err);
      showToast('مشكلة في تحميل الرسايل');
    });
}

/* ════════════════════════════════
   SEND MESSAGE
════════════════════════════════ */
async function sendMsg(){
  const input=document.getElementById('msg-input');
  const txt=input.value.trim();
  if(!txt)return;
  if(!currentUser){showToast('⚠️ سجل دخولك أولاً');return;}
  if(!currentUserData){showToast('⚠️ أكمل بياناتك أولاً');return;}

  // check chat ban
  if(currentUserData.chatBanned){
    const until=currentUserData.chatBannedUntil?.toDate?.();
    if(!until||until>new Date()){showToast('🔇 أنت ممنوع من الكتابة مؤقتاً');return;}
  }
  if(currentUserData.blocked){showToast('🚫 حسابك محظور');return;}

  input.value='';
  input.style.height='auto';
  document.getElementById('mention-list').classList.remove('show');
  document.getElementById('emoji-picker').classList.remove('show');

  const isAdmin=currentUser.email===ADMIN_EMAIL;
  const msgData={
    uid:currentUser.uid,
    fullName:currentUserData.fullName||currentUser.displayName||'مستخدم',
    nickname:currentUserData.nickname||null,
    gradeLabel:currentUserData.gradeLabel||null,
    branch:currentUserData.branch||null,
    grade:currentUserData.grade||null,
    color:userColor(currentUser.uid),
    photoURL:currentUserData.photoURL||currentUser.photoURL||null,
    email:currentUser.email||null,
    platformNum:currentUserData.platformNum||null,
    text:txt,
    time:firebase.firestore.FieldValue.serverTimestamp(),
    replyTo:replyTo||null,
    isAdmin,
    reactions:{},
    readBy:[currentUser.uid],
  };

  cancelReply();

  try{
    await db.collection('chats').doc('group').collection('messages').add(msgData);
    updateLastSeen();
    // update study leaderboard
    db.collection('study').doc(currentUser.uid).set({
      uid:currentUser.uid,
      name:currentUserData.fullName||'مستخدم',
      nickname:currentUserData.nickname||null,
      photoURL:currentUserData.photoURL||null,
      color:userColor(currentUser.uid),
      platformNum:currentUserData.platformNum||null,
      msgCount:firebase.firestore.FieldValue.increment(1),
    },{merge:true}).catch(()=>{});
  }catch(e){
    showToast('حصل خطأ في الإرسال');
    input.value=txt; // رجّع النص لو فشل
  }
}

/* ════════════════════════════════
   REACTIONS — حقيقية في Firestore
════════════════════════════════ */
async function toggleReaction(msgId,emoji){
  if(!currentUser||!db)return;
  const ref=db.collection('chats').doc('group').collection('messages').doc(msgId);
  try{
    const doc=await ref.get();
    if(!doc.exists)return;
    const reactions=doc.data().reactions||{};
    const curr=reactions[emoji]||{count:0,users:[]};
    const users=curr.users||[];
    const myIdx=users.indexOf(currentUser.uid);
    if(myIdx===-1){
      // إضافة
      reactions[emoji]={count:(curr.count||0)+1,users:[...users,currentUser.uid]};
    } else {
      // إزالة
      users.splice(myIdx,1);
      if(users.length===0){delete reactions[emoji];}
      else{reactions[emoji]={count:users.length,users};}
    }
    await ref.update({reactions});
  }catch(e){showToast('خطأ في الريأكشن');}
}

/* ════════════════════════════════

════════════════════════════════ */
function setReply(id,name,text){
  replyTo={id,name,text};
  document.getElementById('rb-name').textContent=name;
  document.getElementById('rb-txt').textContent=text;
  document.getElementById('reply-bar').classList.add('show');
  document.getElementById('msg-input').focus();
}
function cancelReply(){
  replyTo=null;
  document.getElementById('reply-bar').classList.remove('show');
}
function scrollToMsg(id){
  if(!id)return;
  const el=document.getElementById('msg-'+id);
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='rgba(59,130,246,0.1)';setTimeout(()=>el.style.background='',1000);}
}

/* ════════════════════════════════
   INPUT HANDLING
════════════════════════════════ */
function handleInput(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
  const val=el.value;
  const atIdx=val.lastIndexOf('@');
  if(atIdx!==-1){
    const q=val.slice(atIdx+1).toLowerCase();
    if(!q.includes(' '))showMentionList(q);
    else document.getElementById('mention-list').classList.remove('show');
  } else {
    document.getElementById('mention-list').classList.remove('show');
  }
  // typing indicator في Firestore
  if(db&&currentUser){
    clearTimeout(typingTimer);
    db.collection('typing').doc('group').set({[currentUser.uid]:true},{merge:true}).catch(()=>{});
    typingTimer=setTimeout(()=>{
      db.collection('typing').doc('group').update({[currentUser.uid]:firebase.firestore.FieldValue.delete()}).catch(()=>{});
    },2000);
  }
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}

/* ════════════════════════════════
   MENTION LIST — من Firestore
════════════════════════════════ */
async function showMentionList(query){
  if(!db)return;
  const ml=document.getElementById('mention-list');
  try{
    // جيب من Firestore
    let snap;
    if(query===''){
      snap=await db.collection('users').orderBy('fullName').limit(8).get();
    } else {
      snap=await db.collection('users').orderBy('fullName').startAt(query).endAt(query+'\uf8ff').limit(6).get();
    }
    const users=[];
    snap.forEach(d=>{
      if(d.id!==currentUser?.uid)users.push({id:d.id,...d.data()});
    });
    // always add "الكل"
    const items=[{fullName:'الكل',nickname:'منشن الجميع',color:'#ef4444'},...users];
    if(!items.length){ml.classList.remove('show');return;}
    ml.innerHTML=items.map(u=>{
      const name=u.nickname||u.fullName||'مستخدم';
      const grade=u.gradeLabel&&u.branch?`${u.gradeLabel} ${u.branch}`:'';
      const col=u.color||userColor(u.id||'x');
      return`<div class="mention-item" onclick="insertMention('${name}')">
        <div class="mi-av" style="background:${col}">${name.charAt(0)}</div>
        <div>
          <div class="mi-name">${name}</div>
          <div class="mi-grade">${grade}</div>
        </div>
      </div>`;
    }).join('');
    ml.classList.add('show');
  }catch(e){ml.classList.remove('show');}
}

function insertMention(name){
  const input=document.getElementById('msg-input');
  const val=input.value;
  const atIdx=val.lastIndexOf('@');
  input.value=val.substring(0,atIdx)+'@'+name+' ';
  document.getElementById('mention-list').classList.remove('show');
  input.focus();
}

/* ════════════════════════════════
   EMOJI PICKER
════════════════════════════════ */
function toggleEmoji(e){
  e.stopPropagation();
  const ep=document.getElementById('emoji-picker');
  if(!ep.querySelector('.ep-emoji')){
    // populate
    document.getElementById('emoji-grid').innerHTML=EMOJIS.map(em=>
      `<div class="ep-emoji" onclick="insertEmoji('${em}')">${em}</div>`
    ).join('');
  }
  ep.classList.toggle('show');
  document.getElementById('mention-list').classList.remove('show');
}
function insertEmoji(e){
  const input=document.getElementById('msg-input');
  const pos=input.selectionStart;
  input.value=input.value.slice(0,pos)+e+input.value.slice(pos);
  input.selectionStart=input.selectionEnd=pos+e.length;
  document.getElementById('emoji-picker').classList.remove('show');
  input.focus();
  // trigger resize
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,100)+'px';
}

// close emoji/mention on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('#emoji-picker')&&!e.target.closest('.input-icon'))
    document.getElementById('emoji-picker').classList.remove('show');
  if(!e.target.closest('#mention-list')&&!e.target.closest('#msg-input'))
    document.getElementById('mention-list').classList.remove('show');
  if(!e.target.closest('#room-menu')&&!e.target.closest('#menu-btn'))
    document.getElementById('room-menu').classList.remove('show');
});

/* ════════════════════════════════
   ROOM MENU — التلت نقط
════════════════════════════════ */
function toggleRoomMenu(){
  document.getElementById('room-menu').classList.toggle('show');
}

function menuAction(action){
  document.getElementById('room-menu').classList.remove('show');
  if(action==='mute'){
    showToast('🔕 تم كتم الإشعارات');
  } else if(action==='pinned'){
    const pt=document.getElementById('pinned-txt').textContent;
    alert('📌 الرسالة المثبتة:\n\n'+pt);
  } else if(action==='members'){
    // اعرض عدد الأعضاء
    const count=document.getElementById('members-count').textContent;
    showToast('👥 '+count);
  } else if(action==='report'){
    showToast('🚩 جاري فتح نموذج الإبلاغ...');
    // يمكن توجيهه لصفحة أو modal
  } else if(action==='developer'){
    // واتساب المطور
    window.open('https://wa.me/201900000000?text=استفسار من لمة الثانوية','_blank');
  }
}

/* ════════════════════════════════
   PROFILE POPUP — من Firestore
════════════════════════════════ */
async function showProfile(uid){
  if(!uid||!db)return;
  const popup=document.getElementById('profile-popup');
  // reset
  document.getElementById('pp-name').textContent='جاري التحميل...';
  document.getElementById('pp-grade').textContent='';
  document.getElementById('pp-num').textContent='';
  popup.classList.add('show');
  try{
    const doc=await db.collection('users').doc(uid).get();
    if(!doc.exists){document.getElementById('pp-name').textContent='مستخدم غير موجود';return;}
    const u=doc.data();
    const isAdmin=u.email===ADMIN_EMAIL||u.platformNum===ADMIN_NUM;
    const displayName=u.nickname||u.fullName||'مستخدم';
    const color=u.color||userColor(uid);
    const grade=u.gradeLabel&&u.branch?`${u.gradeLabel} ${u.branch}`:(u.grade||'');

    const av=document.getElementById('pp-avatar');
    av.style.background=color;
    av.className='pp-avatar'+(isAdmin?' dev-frame':'');
    av.innerHTML=u.photoURL
      ?`<img src="${u.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      :displayName.charAt(0).toUpperCase();

    document.getElementById('pp-name').innerHTML=isAdmin
      ?`<span style="color:var(--gold2)">HAMO</span> <span class="verified">✓</span> <span class="dev-badge">مطور الموقع</span>`
      :displayName;
    document.getElementById('pp-grade').textContent=grade;
    document.getElementById('pp-num').textContent=u.platformNum||'رقم التواصل غير محدد';

    // زر المراسلة — مخفي لأنا شيلنا الخاص
    document.getElementById('pp-msg-btn').style.display='none';
  }catch(e){document.getElementById('pp-name').textContent='خطأ في التحميل';}
}

function copyNum(){
  const num=document.getElementById('pp-num').textContent;
  if(num&&num!=='رقم التواصل غير محدد'){
    navigator.clipboard?.writeText(num).catch(()=>{});
    showToast('📋 تم نسخ رقم التواصل: '+num);
  }
  document.getElementById('profile-popup').classList.remove('show');
}

/* ════════════════════════════════
   SEARCH IN MESSAGES
════════════════════════════════ */
function openSearch(){
  document.getElementById('room-menu').classList.remove('show');
  document.getElementById('search-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('search-overlay-input').focus(),200);
}
function closeSearch(){
  document.getElementById('search-overlay').classList.remove('show');
  document.getElementById('search-overlay-input').value='';
  document.getElementById('search-results').innerHTML='';
}
async function searchMessages(q){
  const res=document.getElementById('search-results');
  if(!q.trim()){res.innerHTML='';return;}
  if(!db){res.innerHTML='<div style="color:var(--text3);font-size:12px;text-align:center;padding:16px">Firebase غير متصل</div>';return;}
  res.innerHTML='<div style="color:var(--text3);font-size:12px;text-align:center;padding:16px">جاري البحث...</div>';
  try{
    const snap=await db.collection('chats').doc('group').collection('messages')
      .orderBy('time','desc').limit(200).get();
    const results=[];
    snap.forEach(d=>{
      if((d.data().text||'').includes(q))results.push({id:d.id,...d.data()});
    });
    if(!results.length){res.innerHTML='<div style="color:var(--text3);font-size:12px;text-align:center;padding:16px">لا توجد نتائج</div>';return;}
    res.innerHTML=results.slice(0,10).map(m=>`
      <div class="search-result" onclick="closeSearch();scrollToMsg('${m.id}')">
        <div style="width:32px;height:32px;border-radius:50%;background:${m.color||userColor(m.uid||'x')};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff">
          ${(m.nickname||m.fullName||m.name||'?').charAt(0)}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;margin-bottom:2px">${m.nickname||m.fullName||m.name||'مستخدم'}</div>
          <div style="font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(m.text||'').replace(q,'<mark style="background:rgba(59,130,246,0.3);color:var(--text);border-radius:2px">'+q+'</mark>')}</div>
        </div>
        <div style="font-size:10px;color:var(--text4)">${timeStr(m.time)}</div>
      </div>`).join('');
  }catch(e){res.innerHTML='<div style="color:var(--red);font-size:12px;text-align:center;padding:16px">خطأ في البحث</div>';}
}

/* ════════════════════════════════
   FILTER CHATS (list view)

function filterChats(q){
  // في الوقت الحالي جروب واحد بس — الوظيفة جاهزة للتوسع
  const groupItem=document.querySelector('.chat-item.pinned');
  if(groupItem){
    groupItem.style.display=(!q||'جروب لمة الثانوية'.includes(q))?'':'none';
  }
}
