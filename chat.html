<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9930819696369359"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#06080f">
<title>لمة الثانوية — المحادثات</title>
<link rel="icon" type="image/png" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080f;--bg2:#0a0e1a;--bg3:#0f1525;--card:#111827;--card2:#1a2240;
  --blue:#3b82f6;--blue2:#60a5fa;--teal:#14b8a6;--teal2:#2dd4bf;
  --purple:#8b5cf6;--purple2:#a78bfa;--gold:#f59e0b;--gold2:#fbbf24;
  --green:#22c55e;--red:#ef4444;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--text4:#475569;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --r:12px;--r2:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(59,130,246,0.05),transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(20,184,166,0.05),transparent 50%);pointer-events:none;z-index:0}

/* ── Chat list view ── */
#chat-list-view{display:flex;flex-direction:column;height:100%;position:relative;z-index:1}

/* list topbar */
.list-topbar{background:rgba(6,8,15,0.95);backdrop-filter:blur(16px);border-bottom:0.5px solid var(--border);padding:10px 14px;flex-shrink:0}
.list-topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.list-title{font-family:'Cairo',sans-serif;font-size:17px;font-weight:700;color:var(--text)}
.list-actions{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.icon-btn:hover{background:var(--card2)}
.icon-btn svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:8px 12px}
.search-box svg{width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:1.5;flex-shrink:0}
.search-input{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:var(--text);font-family:'Tajawal',sans-serif}
.search-input::placeholder{color:var(--text4)}

/* chat items */
.chat-items{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.pinned-label{font-size:10px;color:var(--text4);padding:4px 14px;letter-spacing:1px}
.chat-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background 0.15s;position:relative}
.chat-item:hover{background:rgba(255,255,255,0.03)}
.chat-item.pinned{background:rgba(59,130,246,0.04);border-right:2px solid var(--blue)}
.ci-avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;position:relative}
.ci-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ci-online{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2px solid var(--bg)}
.ci-info{flex:1;min-width:0}
.ci-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.ci-name{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px}
.ci-time{font-size:10px;color:var(--text4)}
.ci-last-row{display:flex;align-items:center;justify-content:space-between}
.ci-last{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.ci-badge{min-width:18px;height:18px;border-radius:9px;background:var(--blue);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}
.pin-icon{font-size:10px;color:var(--text4)}
.verified{font-size:12px}
.dev-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(245,158,11,0.15);color:var(--gold2);border:0.5px solid rgba(245,158,11,0.2)}

/* ── Chat room view ── */
#chat-room-view{display:none;flex-direction:column;height:100%;position:relative;z-index:1}

/* room header */
.room-header{background:rgba(6,8,15,0.95);backdrop-filter:blur(16px);border-bottom:0.5px solid var(--border);padding:10px 14px;flex-shrink:0}
.rh-row1{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back-btn svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.rh-avatar{width:36px;height:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.rh-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.rh-info{flex:1}
.rh-name{font-size:14px;font-weight:700;color:var(--text)}
.rh-sub{font-size:10px;color:var(--text3)}
.rh-actions{display:flex;gap:6px}
.rh-stats{display:flex;gap:10px;padding:6px 0 0}
.rh-stat{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.stat-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:statpulse 2s infinite}
@keyframes statpulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* pinned msg */
.pinned-msg{background:rgba(59,130,246,0.06);border-bottom:0.5px solid rgba(59,130,246,0.15);padding:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.pm-icon{font-size:12px;color:var(--blue2)}
.pm-txt{font-size:11px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* messages area */
.messages-area{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.date-divider{text-align:center;font-size:10px;color:var(--text4);padding:4px 0;display:flex;align-items:center;gap:8px}
.date-divider::before,.date-divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* message */
.msg-wrap{display:flex;gap:8px;align-items:flex-end;max-width:85%}
.msg-wrap.mine{flex-direction:row-reverse;align-self:flex-end}
.msg-wrap.other{align-self:flex-start}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;cursor:pointer;overflow:hidden;position:relative}
.msg-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.msg-av.dev-av{border:2px solid var(--gold)}
.msg-body{}
.msg-meta{font-size:9px;color:var(--text4);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.msg-meta.mine{justify-content:flex-end}
.grade-tag{font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(59,130,246,0.1);color:var(--blue2)}
.grade-tag.azhar{background:rgba(20,184,166,0.1);color:var(--teal2)}
.grade-tag.adabi{background:rgba(245,158,11,0.1);color:var(--gold2)}
.dev-name{color:var(--gold2);font-weight:600}
.bubble{padding:8px 11px;position:relative;cursor:pointer;transition:opacity 0.15s}
.bubble:hover{opacity:0.9}
.bubble.other{background:var(--card2);border-radius:12px 12px 12px 2px;border:0.5px solid var(--border)}
.bubble.mine{background:linear-gradient(135deg,#1d4ed8,#1e3a8a);border-radius:12px 12px 2px 12px}
.bubble.dev{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(251,191,36,0.1));border:0.5px solid rgba(245,158,11,0.2);border-radius:12px 12px 12px 2px}
.bubble-txt{font-size:13px;color:var(--text);line-height:1.5}
.bubble-txt.big-emoji{font-size:32px;background:transparent!important;border:none!important;padding:2px 0}
.bubble-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;gap:8px}
.bubble-time{font-size:9px;color:rgba(255,255,255,0.35)}
.bubble-ticks{font-size:10px;color:var(--blue2)}

/* reply preview inside bubble */
.reply-preview{background:rgba(255,255,255,0.06);border-right:2px solid var(--blue2);padding:5px 8px;border-radius:5px;margin-bottom:6px;cursor:pointer}
.rp-name{font-size:9px;color:var(--blue2);margin-bottom:2px}
.rp-txt{font-size:10px;color:var(--text3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:160px}

/* reactions */
.reactions-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.reaction-pill{background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:2px 7px;font-size:10px;display:flex;align-items:center;gap:3px;cursor:pointer;transition:all 0.15s}
.reaction-pill:hover{background:rgba(255,255,255,0.12);transform:scale(1.05)}
.reaction-pill.mine{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.3)}
.reaction-count{font-size:9px;color:var(--text3)}
.reaction-bar{position:absolute;top:-34px;right:0;background:var(--card2);border:0.5px solid var(--border2);border-radius:20px;padding:5px 8px;display:flex;gap:6px;opacity:0;transform:scale(0.8);transition:all 0.2s;pointer-events:none;z-index:10;white-space:nowrap}
.bubble:hover .reaction-bar{opacity:1;transform:scale(1);pointer-events:all}
.r-emoji{font-size:16px;cursor:pointer;transition:transform 0.15s;line-height:1}
.r-emoji:hover{transform:scale(1.3)}

/* typing indicator */
.typing-indicator{display:flex;gap:8px;align-items:flex-end;padding:2px 0}
.typing-bubble{background:var(--card2);border-radius:12px 12px 12px 2px;padding:10px 12px;display:flex;gap:4px;align-items:center;border:0.5px solid var(--border)}
.td{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.td:nth-child(1){animation:tb 1s ease 0s infinite}
.td:nth-child(2){animation:tb 1s ease 0.15s infinite}
.td:nth-child(3){animation:tb 1s ease 0.3s infinite}
@keyframes tb{0%,100%{transform:translateY(0);background:var(--text4)}50%{transform:translateY(-4px);background:var(--blue)}}

/* reply bar */
.reply-bar{background:rgba(59,130,246,0.06);border-top:0.5px solid rgba(59,130,246,0.15);padding:8px 14px;display:none;flex-shrink:0;align-items:center;gap:8px}
.reply-bar.show{display:flex}
.rb-content{flex:1}
.rb-name{font-size:10px;color:var(--blue2);margin-bottom:2px}
.rb-txt{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-close{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex-shrink:0;color:var(--text3)}

/* input area */
.input-area{background:rgba(10,14,26,0.95);backdrop-filter:blur(12px);border-top:0.5px solid var(--border);padding:10px 12px;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.input-row{display:flex;align-items:flex-end;gap:8px}
.input-box{flex:1;background:var(--card);border:0.5px solid var(--border);border-radius:22px;padding:10px 14px;font-size:13px;color:var(--text);font-family:'Tajawal',sans-serif;outline:none;resize:none;max-height:100px;min-height:42px;line-height:1.4;transition:border-color 0.2s;scrollbar-width:none}
.input-box:focus{border-color:rgba(59,130,246,0.4)}
.input-box::placeholder{color:var(--text4)}
.input-icons{display:flex;gap:6px;align-items:center;padding-bottom:6px}
.input-icon{font-size:20px;cursor:pointer;transition:transform 0.15s;line-height:1}
.input-icon:hover{transform:scale(1.15)}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s;border:none}
.send-btn:hover{transform:scale(1.05)}
.send-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* mention list */
.mention-list{position:absolute;bottom:70px;right:12px;left:12px;background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--r);overflow:hidden;display:none;z-index:20;max-height:180px;overflow-y:auto}
.mention-list.show{display:block}
.mention-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;transition:background 0.15s}
.mention-item:hover{background:rgba(255,255,255,0.04)}
.mi-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.mi-name{font-size:12px;color:var(--text)}
.mi-grade{font-size:10px;color:var(--text3)}

/* emoji picker */
.emoji-picker{position:absolute;bottom:70px;right:12px;background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--r2);padding:12px;display:none;z-index:20;width:280px}
.emoji-picker.show{display:block}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.ep-emoji{font-size:22px;cursor:pointer;text-align:center;padding:4px;border-radius:6px;transition:all 0.15s;line-height:1}
.ep-emoji:hover{background:rgba(255,255,255,0.08);transform:scale(1.2)}

/* profile popup */
.profile-popup{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:flex-end;justify-content:center}
.profile-popup.show{display:flex}
.pp-card{background:var(--bg3);border-radius:24px 24px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pp-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pp-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;position:relative}
.pp-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.pp-avatar.dev-frame{border:2px solid var(--gold)}
.pp-info{}
.pp-name{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.pp-grade{font-size:12px;color:var(--text3);margin-top:2px}
.pp-num{font-size:12px;color:var(--blue2);margin-top:3px}
.pp-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.pp-btn{padding:10px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--card);font-size:12px;color:var(--text2);cursor:pointer;text-align:center;font-family:'Tajawal',sans-serif;transition:all 0.2s}
.pp-btn:hover{background:var(--card2)}
.pp-btn.primary{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.3);color:var(--blue2)}
.pp-close{position:absolute;top:16px;left:16px;width:28px;height:28px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text3)}

/* toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px 18px;font-size:12px;color:var(--text);z-index:9000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* bottom nav */
.bottom-nav{background:rgba(10,14,26,0.95);backdrop-filter:blur(16px);border-top:0.5px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all 0.2s;text-decoration:none}
.nav-item svg{width:22px;height:22px;stroke:var(--text4);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s}
.nav-item.active svg{stroke:var(--blue2)}
.nav-label{font-size:9px;color:var(--text4);transition:color 0.2s}
.nav-item.active .nav-label{color:var(--blue2)}
</style>
</head>
<body>

<div id="toast"></div>

<!-- Profile popup -->
<div class="profile-popup" id="profile-popup" onclick="closeProfile(event)">
  <div class="pp-card" style="position:relative">
    <div class="pp-close" onclick="document.getElementById('profile-popup').classList.remove('show')">✕</div>
    <div class="pp-header">
      <div class="pp-avatar" id="pp-avatar">م</div>
      <div class="pp-info">
        <div class="pp-name" id="pp-name">محمد</div>
        <div class="pp-grade" id="pp-grade">3 ثانوي علمي علوم</div>
        <div class="pp-num" id="pp-num">01900000001</div>
      </div>
    </div>
    <div class="pp-actions">
      <div class="pp-btn primary" onclick="startPrivateChat()">💬 مراسلة</div>
      <div class="pp-btn" onclick="copyNum()">📋 نسخ الرقم</div>
    </div>
  </div>
</div>

<!-- CHAT LIST VIEW -->
<div id="chat-list-view">
  <div class="list-topbar">
    <div class="list-topbar-row1">
      <div class="list-title">المحادثات 💬</div>
      <div class="list-actions">
        <div class="icon-btn" id="add-chat-btn" onclick="showAddChat()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </div>
    </div>
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search-input" placeholder="ابحث باسم أو رقم تواصل..." oninput="filterChats(this.value)">
    </div>
  </div>
  <div class="chat-items" id="chat-items">
    <div class="pinned-label">📌 مثبت</div>
    <div class="chat-item pinned" onclick="openChat('group')">
      <div class="ci-avatar" style="background:linear-gradient(135deg,#3b82f6,#14b8a6);font-size:22px">💬</div>
      <div class="ci-info">
        <div class="ci-name-row">
          <div class="ci-name">جروب لمة الثانوية <span class="pin-icon">📌</span></div>
          <div class="ci-time" id="group-time">الآن</div>
        </div>
        <div class="ci-last-row">
          <div class="ci-last" id="group-last">أهلاً بالجميع في لمة الثانوية! 🎯</div>
          <div class="ci-badge" id="group-badge" style="display:none">3</div>
        </div>
      </div>
    </div>
    <div style="height:0.5px;background:var(--border);margin:4px 0"></div>
    <div id="private-chats"></div>
  </div>
  <nav class="bottom-nav">
    <a class="nav-item" href="index.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span class="nav-label">الرئيسية</span></a>
    <a class="nav-item" href="schedule.html"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="nav-label">الجداول</span></a>

        try {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) currentUserData = doc.data();
        } catch (e) { console.log("User data error"); }
    }
});

// 2. دالة الإرسال (مباشرة وبسيطة)
window.sendMsg = function() {
    const input = document.getElementById('msg-input');
    const txt = input.value.trim();
    
    if (!txt) return; // لو مفيش نص متعملش حاجة
    if (!currentUser) { showToast("سجل دخولك أولاً"); return; }

    // بنبعت للـ collection اللي اسمها messages جوه doc اسمه group
    db.collection('chats').doc('group').collection('messages').add({
        uid: currentUser.uid,
        name: currentUserData?.fullName || currentUser.displayName || 'مستخدم',
        nickname: currentUserData?.nickname || '',
        grade: currentUserData ? `${currentUserData.gradeLabel} ${currentUserData.branch}` : '',
        text: txt,
        time: firebase.firestore.FieldValue.serverTimestamp(),
        isAdmin: (currentUser.email === "alawadi7760@gmail.com"),
        photoURL: currentUser.photoURL || null
    }).then(() => {
        input.value = '';
        input.style.height = 'auto';
        cancelReply();
    }).catch(err => {
        showToast("خطأ في الإرسال.. جرب تاني");
        console.error(err);
    });
};

// 3. دالة فتح الشات (بتجيب الرسايل فوراً)
window.openChat = function(id) {
    currentChat = 'group'; 
    document.getElementById('chat-list-view').style.display = 'none';
    document.getElementById('chat-room-view').style.display = 'flex';
    
    const area = document.getElementById('messages-area');
    area.innerHTML = '<div class="date-divider">جاري تحميل الرسايل...</div>';

    // بنقرأ من نفس المكان اللي بنبعت فيه
    db.collection('chats').doc('group').collection('messages')
        .orderBy('time', 'asc')
        .onSnapshot(snap => {
            area.innerHTML = '<div class="date-divider">اليوم</div>';
            snap.forEach(doc => {
                const data = doc.data();
                let timeStr = "الآن";
                if(data.time && data.time.toDate) {
                    timeStr = data.time.toDate().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
                }
                const m = { id: doc.id, ...data, time: timeStr };
                const isMe = currentUser && m.uid === currentUser.uid;
                const div = document.createElement('div');
                div.innerHTML = renderMsg(m, isMe);
                area.appendChild(div.firstElementChild);
            });
            area.scrollTop = area.scrollHeight;
        });
};
</script>
